<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Contact | Hello World</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 6rem 1rem 2rem;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: #f8fafc;
      background:
        radial-gradient(circle at 18% 22%, rgba(56, 189, 248, 0.28), transparent 30%),
        radial-gradient(circle at 82% 18%, rgba(244, 114, 182, 0.25), transparent 28%),
        linear-gradient(135deg, #020617 0%, #111827 48%, #172554 100%);
      overflow-x: hidden;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(255, 255, 255, 0.05) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255, 255, 255, 0.05) 1px, transparent 1px);
      background-size: 44px 44px;
      mask-image: radial-gradient(circle, black 0%, transparent 72%);
      pointer-events: none;
    }

    .site-nav {
      position: fixed;
      top: 1.25rem;
      left: 50%;
      z-index: 10;
      display: flex;
      gap: 0.45rem;
      padding: 0.4rem;
      border: 1px solid rgba(255, 255, 255, 0.16);
      border-radius: 999px;
      background: rgba(15, 23, 42, 0.68);
      box-shadow: 0 18px 40px rgba(0, 0, 0, 0.28);
      backdrop-filter: blur(18px);
      transform: translateX(-50%);
    }

    .site-nav a {
      padding: 0.65rem 0.9rem;
      border-radius: 999px;
      color: #cbd5e1;
      font-size: 0.95rem;
      font-weight: 700;
      text-decoration: none;
      transition: color 180ms ease, background 180ms ease;
    }

    .site-nav a:hover,
    .site-nav a.active {
      color: #082f49;
      background: linear-gradient(135deg, #67e8f9, #f0abfc);
    }

    .card {
      width: min(92vw, 760px);
      padding: clamp(2rem, 6vw, 4.5rem);
      border: 1px solid rgba(255, 255, 255, 0.18);
      border-radius: 28px;
      background: rgba(15, 23, 42, 0.64);
      box-shadow: 0 30px 90px rgba(0, 0, 0, 0.42);
      backdrop-filter: blur(24px);
      text-align: center;
      position: relative;
      overflow: hidden;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 0.55rem;
      padding: 0.55rem 0.85rem;
      border-radius: 999px;
      background: rgba(14, 165, 233, 0.14);
      color: #bae6fd;
      font-size: 0.9rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      border: 1px solid rgba(125, 211, 252, 0.35);
    }

    .dot {
      width: 0.6rem;
      height: 0.6rem;
      border-radius: 999px;
      background: #22c55e;
      box-shadow: 0 0 18px #22c55e;
    }

    h1 {
      margin: 1.4rem 0 0.7rem;
      font-size: clamp(3rem, 10vw, 6rem);
      line-height: 0.95;
      letter-spacing: 0;
      background: linear-gradient(90deg, #f8fafc, #7dd3fc, #f0abfc);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }

    p {
      margin: 0 auto;
      max-width: 560px;
      color: #cbd5e1;
      font-size: clamp(1rem, 2.2vw, 1.2rem);
      line-height: 1.7;
    }

    .contact-box {
      margin: 2rem auto 0;
      display: grid;
      gap: 0.85rem;
      max-width: 430px;
    }

    .contact-link {
      display: block;
      padding: 1rem 1.1rem;
      border: 1px solid rgba(255, 255, 255, 0.16);
      border-radius: 18px;
      color: #f8fafc;
      text-decoration: none;
      background: rgba(255, 255, 255, 0.07);
      transition: transform 180ms ease, background 180ms ease, border-color 180ms ease;
    }

    .contact-link:hover {
      transform: translateY(-3px);
      background: rgba(255, 255, 255, 0.13);
      border-color: rgba(255, 255, 255, 0.34);
    }

    .contact-link span {
      display: block;
      margin-top: 0.25rem;
      color: #bae6fd;
      font-size: 0.95rem;
    }

    .actions {
      margin-top: 2rem;
      display: flex;
      justify-content: center;
      gap: 0.9rem;
      flex-wrap: wrap;
    }

    .button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 46px;
      padding: 0 1.15rem;
      border-radius: 999px;
      border: 1px solid rgba(255, 255, 255, 0.22);
      color: #f8fafc;
      text-decoration: none;
      font-weight: 700;
      background: rgba(255, 255, 255, 0.08);
      transition: transform 180ms ease, background 180ms ease, border-color 180ms ease;
    }

    .button.primary {
      color: #082f49;
      background: linear-gradient(135deg, #67e8f9, #f0abfc);
      border-color: transparent;
    }

    .button:hover {
      transform: translateY(-3px);
      background: rgba(255, 255, 255, 0.14);
      border-color: rgba(255, 255, 255, 0.38);
    }
  </style>
</head>
<body>
  <nav class="site-nav" aria-label="Main navigation">
    <a href="index.html">Home</a>
    <a href="about.html">About</a>
    <a class="active" href="contact.html">Contact</a>
  </nav>

  <main class="card">
    <div class="badge"><span class="dot"></span> Get in touch</div>
    <h1>Say Hello</h1>
    <p>Want to keep building this mini site? Use this page as the starting point for your real contact details.</p>
    <div class="contact-box" aria-label="Contact options">
      <a class="contact-link" href="mailto:hello@example.com">
        Email
        <span>hello@example.com</span>
      </a>
      <a class="contact-link" href="tel:+10000000000">
        Phone
        <span>+1 000 000 0000</span>
      </a>
    </div>
    <div class="actions">
      <a class="button primary" href="index.html">Back Home</a>
      <a class="button" href="about.html">About Page</a>
    </div>
  </main>
</body>
</html>
