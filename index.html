<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hello World</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: #f8fafc;
      background:
        radial-gradient(circle at 20% 20%, rgba(56, 189, 248, 0.28), transparent 30%),
        radial-gradient(circle at 80% 10%, rgba(244, 114, 182, 0.25), transparent 28%),
        linear-gradient(135deg, #020617 0%, #111827 48%, #172554 100%);
      overflow: hidden;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(255, 255, 255, 0.05) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255, 255, 255, 0.05) 1px, transparent 1px);
      background-size: 44px 44px;
      mask-image: radial-gradient(circle, black 0%, transparent 72%);
      pointer-events: none;
    }

    .card {
      width: min(92vw, 760px);
      padding: clamp(2rem, 7vw, 5rem);
      border: 1px solid rgba(255, 255, 255, 0.18);
      border-radius: 28px;
      background: rgba(15, 23, 42, 0.64);
      box-shadow: 0 30px 90px rgba(0, 0, 0, 0.42);
      backdrop-filter: blur(24px);
      text-align: center;
      position: relative;
      overflow: hidden;
    }

    .card::after {
      content: "";
      position: absolute;
      inset: -2px;
      background: linear-gradient(120deg, transparent, rgba(255, 255, 255, 0.24), transparent);
      transform: translateX(-100%);
      animation: shine 4s ease-in-out infinite;
      pointer-events: none;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 0.55rem;
      padding: 0.55rem 0.85rem;
      border-radius: 999px;
      background: rgba(14, 165, 233, 0.14);
      color: #bae6fd;
      font-size: 0.9rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      border: 1px solid rgba(125, 211, 252, 0.35);
    }

    .dot {
      width: 0.6rem;
      height: 0.6rem;
      border-radius: 999px;
      background: #22c55e;
      box-shadow: 0 0 18px #22c55e;
    }

    h1 {
      margin: 1.4rem 0 0.7rem;
      font-size: clamp(3.3rem, 12vw, 7.5rem);
      line-height: 0.92;
      letter-spacing: 0;
      background: linear-gradient(90deg, #f8fafc, #7dd3fc, #f0abfc);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }

    p {
      margin: 0 auto;
      max-width: 560px;
      color: #cbd5e1;
      font-size: clamp(1rem, 2.4vw, 1.25rem);
      line-height: 1.7;
    }

    .actions {
      margin-top: 2rem;
      display: flex;
      justify-content: center;
      gap: 0.9rem;
      flex-wrap: wrap;
    }

    .button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 46px;
      padding: 0 1.15rem;
      border-radius: 999px;
      border: 1px solid rgba(255, 255, 255, 0.22);
      color: #f8fafc;
      text-decoration: none;
      font-weight: 700;
      background: rgba(255, 255, 255, 0.08);
      transition: transform 180ms ease, background 180ms ease, border-color 180ms ease;
    }

    .button.primary {
      color: #082f49;
      background: linear-gradient(135deg, #67e8f9, #f0abfc);
      border-color: transparent;
    }

    .button:hover {
      transform: translateY(-3px);
      background: rgba(255, 255, 255, 0.14);
      border-color: rgba(255, 255, 255, 0.38);
    }

    .button.primary:hover {
      background: linear-gradient(135deg, #a5f3fc, #f5d0fe);
    }

    @keyframes shine {
      0%, 45% {
        transform: translateX(-100%);
      }

      70%, 100% {
        transform: translateX(100%);
      }
    }
  </style>
</head>
<body>
  <main class="card">
    <div class="badge"><span class="dot"></span> First page online</div>
    <h1>Hello World</h1>
    <p>A polished little starter page with glassy depth, glowing gradients, and a clean responsive layout.</p>
    <div class="actions">
      <a class="button primary" href="#">Explore</a>
      <a class="button" href="#">View Source</a>
    </div>
  </main>
</body>
</html>
